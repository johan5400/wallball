<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juge · HYROX</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#E53935;--yellow:#FFD600;--green:#00E676;--f:"Barlow Condensed",sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;background:#060608;color:#fff;font-family:var(--f);overflow:hidden;}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:16px;}
.screen.active{display:flex;}

/* HEADER */
.logo-wrap{text-align:center;margin-bottom:16px;}
.logo{width:40px;height:40px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;margin:0 auto 6px;}
.logo-title{font-size:15px;font-weight:900;letter-spacing:3px;}
.logo-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;}

/* CIBLE GRID */
.card{width:100%;max-width:400px;background:#0e0f14;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.35);text-align:center;margin-bottom:14px;}
.cible-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cible-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.cible-btn:active{transform:scale(.95);}
.cible-btn .cn{font-size:32px;font-weight:900;line-height:1;}
.cible-btn .cl{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;letter-spacing:1px;}
.c1{border-color:rgba(229,57,53,.4);} .c1 .cn{color:#E53935;}
.c2{border-color:rgba(255,214,0,.4);} .c2 .cn{color:#FFD600;}
.c3{border-color:rgba(41,121,255,.4);} .c3 .cn{color:#2979FF;}
.c4{border-color:rgba(0,230,118,.4);} .c4 .cn{color:#00E676;}
.c5{border-color:rgba(255,100,0,.4);} .c5 .cn{color:#FF6400;}
.c6{border-color:rgba(200,0,200,.4);} .c6 .cn{color:#C800C8;}
.c7{border-color:rgba(0,200,200,.4);} .c7 .cn{color:#00C8C8;}
.c8{border-color:rgba(200,200,0,.4);} .c8 .cn{color:#C8C800;}

/* COUNTER */
.cnt-label{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:2px;}
.cnt-name{font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:20px;}
.arc-wrap{position:relative;width:190px;height:190px;margin:0 auto 6px;}
svg.arc{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg);}
.arc-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:10;stroke-linecap:round;}
.arc-fill{fill:none;stroke:#E53935;stroke-width:10;stroke-linecap:round;stroke-dasharray:326.7;stroke-dashoffset:326.7;transition:stroke-dashoffset .3s ease,stroke .3s;}
.arc-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cnt-num{font-size:72px;font-weight:900;line-height:1;transition:transform .08s;}
.cnt-num.bump{transform:scale(1.1);}
.cnt-target{font-size:14px;color:rgba(255,255,255,.25);}
.tap-btn{position:absolute;inset:0;border-radius:50%;background:transparent;border:none;cursor:pointer;}
.norep-info{font-size:10px;color:rgba(229,57,53,.6);letter-spacing:1px;margin-bottom:8px;min-height:14px;text-align:center;}

/* BUTTONS */
.btn-row{display:flex;gap:8px;width:100%;max-width:380px;margin-bottom:6px;}
.abtn{flex:1;border:none;border-radius:10px;padding:10px 6px;font-family:var(--f);font-weight:900;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.abtn:active{transform:scale(.96);}
.btn-undo{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);}
.btn-norep{background:rgba(229,57,53,.12);border:2px solid rgba(229,57,53,.35);color:#E53935;}
.btn-back{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);}
.btn-unbroken{width:100%;max-width:380px;margin-bottom:6px;background:linear-gradient(135deg,rgba(255,214,0,.15),rgba(255,150,0,.08));border:2px solid rgba(255,214,0,.4);color:#FFD600;border-radius:10px;padding:10px;font-family:var(--f);font-weight:900;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.btn-unbroken:active{transform:scale(.97);}
.btn-reset{width:100%;max-width:380px;background:rgba(255,150,0,.08);border:1px solid rgba(255,150,0,.25);color:#FF9800;border-radius:10px;padding:8px;font-family:var(--f);font-weight:900;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.btn-reset:active{transform:scale(.97);}

/* DONE */
.done-icon{font-size:60px;margin-bottom:8px;animation:popIn .5s ease;}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.done-title{font-size:48px;font-weight:900;letter-spacing:4px;color:var(--green);margin-bottom:4px;}
.done-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-bottom:24px;}
.btn-main{width:260px;background:var(--red);color:#fff;border:none;border-radius:12px;padding:14px;font-family:var(--f);font-weight:900;font-size:15px;letter-spacing:3px;cursor:pointer;}

/* UNBROKEN OVERLAY */
.ub-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.ub-overlay.show{opacity:1;pointer-events:all;}
.ub-text{font-size:48px;font-weight:900;letter-spacing:6px;color:#FFD600;text-shadow:0 0 40px rgba(255,214,0,.8);animation:ubAnim 1s ease infinite alternate;}
@keyframes ubAnim{0%{transform:scale(1);}100%{transform:scale(1.08);}}

/* BADGE */
.yoyo-badge{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:5px 12px;}
.yoyo-badge span{font-size:11px;font-weight:900;letter-spacing:2px;color:#FFD600;}

/* SLEEP */
#sleep-screen{display:none;position:fixed;inset:0;background:#060608;z-index:999;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
#sleep-screen.show{display:flex;}
.sleep-icon{font-size:50px;margin-bottom:12px;animation:sp 2s ease infinite alternate;}
@keyframes sp{0%{opacity:.3;}100%{opacity:1;}}
.sleep-title{font-size:22px;font-weight:900;letter-spacing:4px;color:rgba(255,255,255,.3);}
.sleep-sub{font-size:11px;color:rgba(255,255,255,.15);letter-spacing:2px;margin-top:6px;}
</style>
</head>
<body>

<!-- SCREEN 1 : CHOIX CIBLE -->
<div class="screen active" id="screen-cible">
  <div class="logo-wrap">
    <div class="logo">K</div>
    <div class="logo-title">MODE JUGE</div>
    <div class="logo-sub">HYROX · WALL BALLS</div>
  </div>
  <div class="card">
    <div class="card-title">📍 CHOISISSEZ VOTRE CIBLE</div>
    <div class="cible-grid" id="cible-grid"></div>
  </div>
</div>

<!-- SCREEN 2 : COMPTAGE -->
<div class="screen" id="screen-count">
  <div class="cnt-label">⚖️ VOUS JUGEZ</div>
  <div class="cnt-name" id="cnt-name">CIBLE 1</div>
  <div class="arc-wrap">
    <svg class="arc" viewBox="0 0 120 120">
      <circle class="arc-bg" cx="60" cy="60" r="52"/>
      <circle class="arc-fill" id="arc-fill" cx="60" cy="60" r="52"/>
    </svg>
    <div class="arc-center">
      <div class="cnt-num" id="cnt-num">0</div>
      <div class="cnt-target">/ <span id="cnt-target">100</span></div>
    </div>
    <button class="tap-btn" id="tap-btn" onclick="tap()"></button>
  </div>
  <div class="norep-info" id="norep-info"></div>
  <button class="btn-unbroken" onclick="triggerUnbroken()">⚡ 100 REPS UNBROKEN !</button>
  <div class="btn-row">
    <button class="abtn btn-undo" onclick="undo()">↩ ANNULER</button>
    <button class="abtn btn-norep" onclick="noRep()">❌ NO REP</button>
    <button class="abtn btn-back" onclick="goBack()">← CIBLES</button>
  </div>
  <button class="btn-reset" onclick="resetCible()">🔄 RESET CETTE CIBLE</button>
</div>

<!-- SCREEN 3 : DONE -->
<div class="screen" id="screen-done">
  <div class="done-icon">🎯</div>
  <div class="done-title">100 !</div>
  <div class="done-sub" id="done-sub">CIBLE 1 · TERMINÉ !</div>
  <button class="btn-unbroken" style="margin-bottom:16px;width:280px;" onclick="triggerUnbroken()">⚡ UNBROKEN !</button>
  <button class="btn-main" onclick="goBack()">← NOUVELLE CIBLE</button>
</div>

<!-- UNBROKEN OVERLAY -->
<div class="ub-overlay" id="ub-overlay" onclick="closeUnbroken()">
  <div style="font-size:40px;margin-bottom:8px;">⭐🔥⭐</div>
  <div class="ub-text">UNBROKEN !</div>
  <div style="font-size:16px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-top:10px;">100 REPS SANS PAUSE</div>
  <div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:16px;letter-spacing:2px;">APPUYEZ POUR FERMER</div>
</div>

<div class="yoyo-badge">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="13" r="8" stroke="#FFD600" stroke-width="2"/>
    <path d="M12 9v4l2.5 2.5" stroke="#FFD600" stroke-width="2" stroke-linecap="round"/>
    <path d="M9 3h6M12 3v2" stroke="#FFD600" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <span>YOYO TIMER</span>
</div>

<script>
var FB_URL = 'https://yoyo-timer-default-rtdb.europe-west1.firebasedatabase.app';
var TARGET = 100;
var NB_CIBLES = 4;
var COLORS = {1:'#E53935',2:'#FFD600',3:'#2979FF',4:'#00E676',5:'#FF6400',6:'#C800C8',7:'#00C8C8',8:'#C8C800'};
var CLASSES = {1:'c1',2:'c2',3:'c3',4:'c4',5:'c5',6:'c6',7:'c7',8:'c8'};
var ARC_CIRC = 326.7;

var currentCible = null;
var score = 0;
var noRepCount = 0;
var scores = {};

// URL params
var p = new URLSearchParams(window.location.search);
if(p.get('fb')) FB_URL = decodeURIComponent(p.get('fb'));
if(p.get('n'))  NB_CIBLES = parseInt(p.get('n')) || 4;

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

function buildGrid(){
  var html = '';
  for(var i=1;i<=NB_CIBLES;i++){
    html += '<div class="cible-btn '+CLASSES[i]+'" onclick="selectCible('+i+')">'
      +'<div class="cn">'+i+'</div><div class="cl">CIBLE '+i+'</div></div>';
  }
  document.getElementById('cible-grid').innerHTML = html;
}

function selectCible(n){
  currentCible = n;
  score = 0; scores[n] = 0; // Always start fresh
  noRepCount = 0;
  document.getElementById('cnt-name').textContent = 'CIBLE ' + n;
  document.getElementById('cnt-name').style.color = COLORS[n];
  document.getElementById('cnt-target').textContent = TARGET;
  document.getElementById('arc-fill').style.stroke = COLORS[n];
  document.getElementById('norep-info').textContent = '';
  document.getElementById('tap-btn').style.opacity = score >= TARGET ? '.3' : '1';
  updateArc(); updateNum();
  // Clear unbroken badge for this cible when new athlete starts
  fbSet('/unbroken/'+n, null);
  show('screen-count');
}

function updateNum(){
  document.getElementById('cnt-num').textContent = score;
}

function updateArc(){
  var pct = score / TARGET;
  var offset = ARC_CIRC * (1 - Math.min(1, pct));
  document.getElementById('arc-fill').style.strokeDashoffset = offset;
  var col = score >= TARGET ? '#00E676' : pct > .66 ? '#FFD600' : pct > .33 ? '#FF9800' : (COLORS[currentCible]||'#E53935');
  document.getElementById('arc-fill').style.stroke = col;
}

function tap(){
  if(score >= TARGET) return;
  score++;
  scores[currentCible] = score;
  var num = document.getElementById('cnt-num');
  num.classList.remove('bump'); void num.offsetWidth; num.classList.add('bump');
  setTimeout(function(){num.classList.remove('bump');},100);
  if(navigator.vibrate) navigator.vibrate(score % 10 === 0 ? [30,10,30] : 15);
  updateNum(); updateArc(); push();
  if(score >= TARGET){
    document.getElementById('tap-btn').style.opacity = '.3';
    document.getElementById('done-sub').textContent = 'CIBLE '+currentCible+' · TERMINÉ !';
    setTimeout(function(){ show('screen-done'); }, 500);
    // Show done screen - juge manually goes back when ready
  }
}

function undo(){
  if(score <= 0) return;
  score--; scores[currentCible] = score;
  document.getElementById('tap-btn').style.opacity = '1';
  updateNum(); updateArc(); push();
  if(navigator.vibrate) navigator.vibrate(20);
}

function noRep(){
  noRepCount++;
  if(navigator.vibrate) navigator.vibrate([30,20,30]);
  document.getElementById('norep-info').textContent = noRepCount + ' NO REP'+(noRepCount>1?'S':'');
  fbSet('/noreps/'+currentCible, noRepCount);
}

function triggerUnbroken(){
  document.getElementById('ub-overlay').classList.add('show');
  if(navigator.vibrate) navigator.vibrate([50,30,50,30,100]);
  fbSet('/unbroken/'+currentCible, {ts:Date.now()});
}

function closeUnbroken(){
  document.getElementById('ub-overlay').classList.remove('show');
}

function resetCible(){
  if(!currentCible) return;
  if(!confirm('Reset la cible '+currentCible+' ?')) return;
  score = 0; scores[currentCible] = 0; noRepCount = 0;
  document.getElementById('tap-btn').style.opacity = '1';
  document.getElementById('norep-info').textContent = '';
  fbSet('/scores/'+currentCible, 0);
  fbSet('/noreps/'+currentCible, 0);
  fbSet('/unbroken/'+currentCible, null);
  updateNum(); updateArc();
  if(navigator.vibrate) navigator.vibrate([30,20,30]);
}

function goBack(){
  if(currentCible){
    fbSet('/scores/'+currentCible, 0);
    fbSet('/noreps/'+currentCible, 0);
    fbSet('/unbroken/'+currentCible, null);
  }
  currentCible=null; score=0; noRepCount=0;
  show('screen-cible');
}

function fbSet(path, val){
  fetch(FB_URL+path+'.json',{
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(val)
  }).catch(function(){});
}

function push(){
  if(!currentCible) return;
  fbSet('/scores/'+currentCible, score);
}

function fetchScores(){
  fetch(FB_URL+'/scores.json')
  .then(function(r){return r.json();})
  .then(function(d){
    if(d && typeof d === 'object'){
      // Detect remote reset - if score was reset to 0 while counting
      if(currentCible && score > 0 && (parseInt(d[currentCible])||0) === 0){
        score = 0; scores[currentCible] = 0; noRepCount = 0;
        document.getElementById('tap-btn').style.opacity = '1';
        document.getElementById('norep-info').textContent = '🔄 REMIS À ZÉRO PAR ADMIN';
        setTimeout(function(){ document.getElementById('norep-info').textContent=''; }, 2000);
        updateNum(); updateArc();
      }
      // Only update background scores, NEVER overwrite active cible score
      Object.keys(d).forEach(function(k){
        if(k != currentCible) scores[k] = d[k];
      });
    }
  }).catch(function(){});
}

fetchScores();
buildGrid();
setInterval(fetchScores, 2000);

var sleepTimer = null;
function resetSleep(){
  if(sleepTimer) clearTimeout(sleepTimer);
  sleepTimer = setTimeout(goSleep, 3*60*1000); // 3 min
}
function goSleep(){
  document.getElementById('sleep-screen').classList.add('show');
}
function wakeUp(){
  document.getElementById('sleep-screen').classList.remove('show');
  resetSleep();
}
document.addEventListener('touchstart', resetSleep);
document.addEventListener('click', resetSleep);
resetSleep();

</script>

<div id="sleep-screen" onclick="wakeUp()">
  <div class="sleep-icon">😴</div>
  <div class="sleep-title">MISE EN VEILLE</div>
  <div class="sleep-sub">APPUYEZ POUR RÉACTIVER</div>
</div>

</body>
</html>
