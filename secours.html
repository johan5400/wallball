<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Juge secours</title>
<style>
body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#060816,#0b1023);color:#fff;display:grid;place-items:center;padding:20px}
.card{width:min(720px,100%);background:linear-gradient(180deg, rgba(14,22,44,.72), rgba(9,13,28,.92));border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.34)}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;font-weight:900;color:#bfd4ff}
h1{margin:8px 0 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
label{display:flex;flex-direction:column;gap:8px;font-size:13px;font-weight:800}
select{padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff}
.btn{margin-top:16px;border:none;border-radius:16px;padding:14px 18px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff}
.note{margin-top:16px;padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#cbd5e1}
@media(max-width:720px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="card">
  <div class="eyebrow">Juge de secours</div>
  <h1>Auto-affectation rapide</h1>
  <div class="grid">
    <label>Zone<select id="zone"></select></label>
    <label>WOD<select id="wod"></select></label>
    <label>Heat<select id="heat"></select></label>
    <label>Lane<select id="lane"></select></label>
  </div>
  <button class="btn" id="assign">Prendre ce poste</button>
  <div class="note" id="note">Aucun poste sélectionné.</div>
</section>

<script>
const demo = JSON.parse(localStorage.getItem('delta_admin_payload') || '{"config":{"zonesCount":2},"wods":[{"id":"w1","name":"WOD 1"}],"heats":[{"id":"h1","zone":1,"heatNo":1,"wodId":"w1","wodName":"WOD 1","lanes":[{"lane":1,"teamName":"TEAM ALPHA"},{"lane":2,"teamName":"TEAM BRAVO"}]},{"id":"h2","zone":2,"heatNo":1,"wodId":"w1","wodName":"WOD 1","lanes":[{"lane":1,"teamName":"TEAM SIGMA"},{"lane":2,"teamName":"TEAM DELTA"}]}]}');
const zone = document.getElementById('zone');
const wod = document.getElementById('wod');
const heat = document.getElementById('heat');
const lane = document.getElementById('lane');
zone.innerHTML = Array.from({length: demo.config.zonesCount || 2}, (_,i)=>`<option value="${i+1}">Zone ${i+1}</option>`).join('');
wod.innerHTML = (demo.wods||[]).map(w => `<option value="${w.id}">${w.name}</option>`).join('');
function refresh(){
  const heats = (demo.heats||[]).filter(h => String(h.zone)===String(zone.value) && h.wodId === wod.value);
  heat.innerHTML = heats.map(h => `<option value="${h.id}">Heat ${h.heatNo}</option>`).join('');
  const current = heats[0];
  lane.innerHTML = (current?.lanes || []).map(l => `<option value="${l.lane}">Lane ${l.lane}</option>`).join('');
}
zone.onchange = refresh; wod.onchange = refresh; heat.onchange = () => {
  const current = (demo.heats||[]).find(h => h.id === heat.value);
  lane.innerHTML = (current?.lanes || []).map(l => `<option value="${l.lane}">Lane ${l.lane}</option>`).join('');
};
refresh();
document.getElementById('assign').onclick = () => {
  const h = (demo.heats||[]).find(x => x.id === heat.value);
  const l = h?.lanes.find(x => String(x.lane) === String(lane.value));
  document.getElementById('note').textContent = l ? `Poste pris : Zone ${h.zone}, ${h.wodName}, Heat ${h.heatNo}, Lane ${l.lane}, Team ${l.teamName}` : 'Aucun poste trouvé.';
};
</script>
</body>
</html>
