<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Judge</title>
<style>
:root{--bg:#060816;--bg2:#0b1023;--card:rgba(12,18,38,.82);--line:rgba(255,255,255,.08);--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6;--violet:#8b5cf6;--red:#ef4444}
*{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--text);font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 20% 10%, rgba(59,130,246,.18), transparent 20%), radial-gradient(circle at 80% 0%, rgba(139,92,246,.16), transparent 20%), linear-gradient(180deg,var(--bg),var(--bg2))}
.shell{width:min(920px,calc(100% - 24px));margin:0 auto;padding:22px 0 34px}
.card{background:linear-gradient(180deg, rgba(14,22,44,.72), rgba(9,13,28,.92));border:1px solid var(--line);box-shadow:0 28px 80px rgba(0,0,0,.34);border-radius:28px;padding:22px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;font-weight:900;color:#bfd4ff}
h1,h2,p{margin:0} .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
label{display:flex;flex-direction:column;gap:8px;font-size:13px;font-weight:800}
select,input{padding:14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn,.btn2{border:none;border-radius:16px;padding:14px 18px;font-weight:900;cursor:pointer}
.btn{background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff}
.btn2{background:rgba(255,255,255,.05);border:1px solid var(--line);color:#fff}
.judge{margin-top:18px}
.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.status{padding:9px 12px;border-radius:999px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.24);font-size:12px;font-weight:900}
.move{margin-top:18px;padding:22px;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid var(--line);text-align:center}
.move h2{font-size:26px}
.counter{font-size:96px;font-weight:900;line-height:1;margin:12px 0}
.mega{width:min(320px,100%);height:320px;border:none;border-radius:999px;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;font-size:88px;font-weight:900;box-shadow:0 28px 80px rgba(59,130,246,.28);cursor:pointer}
.center{text-align:center;margin-top:16px}
.weight{margin-top:16px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:center;padding:20px}
.modal.open{display:grid}
.modal .inner{max-width:420px;width:100%;text-align:center}
@media(max-width:800px){.grid{grid-template-columns:1fr}.counter{font-size:74px}.mega{height:230px;font-size:72px}}
</style>
</head>
<body>
<div class="shell">
  <section class="card">
    <div class="eyebrow">Affectation juge</div>
    <h1>Choisis zone, WOD, heat et lane</h1>
    <div class="grid">
      <label>Zone<select id="zone"></select></label>
      <label>WOD<select id="wod"></select></label>
      <label>Heat<select id="heat"></select></label>
      <label>Lane<select id="lane"></select></label>
    </div>
    <div class="actions">
      <button class="btn" id="assign">Commencer à juger</button>
    </div>
  </section>

  <section class="card judge">
    <div class="top">
      <div>
        <div class="eyebrow" id="meta">Zone 1 · Heat 1 · Lane 1</div>
        <h1 id="team">Aucune équipe</h1>
        <p id="athletes" style="color:#94a3b8;margin-top:8px">—</p>
      </div>
      <div class="status" id="status">EN ATTENTE</div>
    </div>

    <div class="move">
      <div class="eyebrow">Mouvement en cours</div>
      <h2 id="move">Wall Balls</h2>
      <div class="counter" id="counter">0</div>
      <p id="next" style="color:#94a3b8">Mouvement suivant : —</p>
    </div>

    <div class="weight" id="weightWrap" hidden>
      <label>Poids validé<input id="weight" type="number" step="0.1" placeholder="95"></label>
    </div>

    <div class="center">
      <button class="mega" id="plus">+1</button>
    </div>

    <div class="actions" style="justify-content:center">
      <button class="btn2" id="minus">-1</button>
      <button class="btn2" id="validateWeight">Valider poids</button>
      <button class="btn2" id="dnf">DNF</button>
      <button class="btn2" id="abs">Absente</button>
    </div>
  </section>
</div>

<div class="modal" id="tbModal">
  <div class="inner card">
    <div class="eyebrow">Tie-break</div>
    <h1 style="font-size:28px">Valider tie-break</h1>
    <p style="color:#94a3b8;margin:12px 0 18px">La rep seuil a été atteinte.</p>
    <button class="btn" id="tbConfirm">Valider</button>
  </div>
</div>

<script>
const demo = JSON.parse(localStorage.getItem('delta_admin_payload') || '{"config":{"zonesCount":2,"lanesPerZone":6},"wods":[{"id":"w1","name":"WOD 1","scoreType":"reps","rounds":3,"tieBreakRep":21,"movements":[{"reps":"21","move":"Wall Balls"},{"reps":"15","move":"Toes to Bar"},{"reps":"9","move":"Snatch 60kg"}]}],"heats":[{"id":"h1","zone":1,"heatNo":1,"wodId":"w1","wodName":"WOD 1","scoreType":"reps","rounds":3,"tieBreakRep":21,"movements":[{"reps":"21","move":"Wall Balls"},{"reps":"15","move":"Toes to Bar"},{"reps":"9","move":"Snatch 60kg"}],"lanes":[{"lane":1,"teamName":"TEAM ALPHA"},{"lane":2,"teamName":"TEAM BRAVO"},{"lane":3,"teamName":"TEAM SIGMA"}]}],"teams":[{"name":"TEAM ALPHA","athletes":["Dupont","Martin"]},{"name":"TEAM BRAVO","athletes":["Bernard","Noël"]},{"name":"TEAM SIGMA","athletes":["Léo","Tom"]}],"scores":{}}');
let state = JSON.parse(localStorage.getItem('delta_judge_state') || '{}');

function save(){ localStorage.setItem('delta_judge_state', JSON.stringify(state)); localStorage.setItem('delta_live_payload', JSON.stringify(buildLivePayload())); render(); }

function buildLivePayload(){
  const heat = demo.heats.find(h => h.id === state.heatId) || demo.heats[0];
  if(!heat) return {};
  const teams = heat.lanes.map(l => {
    const key = heat.id + '_' + l.lane;
    const score = demo.scores[key] || {};
    return {
      lane:l.lane,
      team:l.teamName,
      athletes:(demo.teams.find(t=>t.name===l.teamName)?.athletes || []).join(' / '),
      score: score.value || 0,
      epa: score.epa || '--',
      status: score.status === 'absent' ? 'abs' : (score.status || 'live')
    };
  });
  return {
    eventName:"DELTA Competition",
    zone:"Zone " + heat.zone,
    heat:"Heat " + heat.heatNo,
    category:"PAIR",
    format:heat.scoreType === 'load' ? 'Max Load' : 'For Time',
    clock:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    wodTitle:heat.wodName,
    wodLines:(heat.movements||[]).map(m => `${m.reps} ${m.move}`).join('\n'),
    scoreType:heat.scoreType,
    totalReps:135,
    teams
  };
}

function initSelectors(){
  const zone = document.getElementById('zone');
  zone.innerHTML = Array.from({length: demo.config.zonesCount || 2}, (_,i)=>`<option value="${i+1}">Zone ${i+1}</option>`).join('');
  const wod = document.getElementById('wod');
  wod.innerHTML = demo.wods.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
  refreshHeats();
  zone.onchange = refreshHeats;
  wod.onchange = refreshHeats;
  document.getElementById('heat').onchange = refreshLanes;
  document.getElementById('assign').onclick = () => {
    state.zone = zone.value;
    state.wodId = wod.value;
    state.heatId = document.getElementById('heat').value;
    state.lane = document.getElementById('lane').value;
    state.reps = state.reps || 0;
    state.value = state.value || 0;
    state.movementIndex = state.movementIndex || 0;
    state.status = state.status || 'live';
    state.tieBreakValidated = state.tieBreakValidated || false;
    save();
  };
}
function refreshHeats(){
  const zone = document.getElementById('zone').value;
  const wodId = document.getElementById('wod').value;
  const heats = demo.heats.filter(h => String(h.zone) === String(zone) && h.wodId === wodId);
  document.getElementById('heat').innerHTML = heats.map(h => `<option value="${h.id}">Heat ${h.heatNo}</option>`).join('');
  refreshLanes();
}
function refreshLanes(){
  const heat = demo.heats.find(h => h.id === document.getElementById('heat').value);
  document.getElementById('lane').innerHTML = (heat?.lanes || []).map(l => `<option value="${l.lane}">Lane ${l.lane}</option>`).join('');
}
function current(){
  const heat = demo.heats.find(h => h.id === state.heatId) || demo.heats[0];
  if(!heat) return {};
  const lane = heat.lanes.find(l => String(l.lane) === String(state.lane)) || heat.lanes[0];
  const team = demo.teams.find(t => t.name === lane?.teamName);
  const move = heat.movements[state.movementIndex || 0] || heat.movements[0] || {};
  const next = heat.movements[(state.movementIndex || 0) + 1];
  return {heat,lane,team,move,next};
}
function persistScore(){
  const c = current();
  if(!c.heat || !c.lane) return;
  const key = c.heat.id + '_' + c.lane.lane;
  demo.scores[key] = { value: state.value || 0, status: state.status || 'live', epa: c.heat.scoreType === 'load' ? (state.value || 0) + ' kg' : Math.round((state.value || 0) * 1.2) };
}
function render(){
  const c = current();
  if(!c.heat || !c.lane) return;
  document.getElementById('meta').textContent = `Zone ${c.heat.zone} · Heat ${c.heat.heatNo} · Lane ${c.lane.lane}`;
  document.getElementById('team').textContent = c.lane.teamName;
  document.getElementById('athletes').textContent = (c.team?.athletes || []).join(' / ') || '—';
  document.getElementById('move').textContent = c.move.move || 'Mouvement';
  document.getElementById('counter').textContent = c.heat.scoreType === 'load' ? (state.value || 0) : (state.reps || 0);
  document.getElementById('next').textContent = c.next ? `Mouvement suivant : ${c.next.move}` : 'Dernier mouvement';
  document.getElementById('status').textContent = (state.status || 'live').toUpperCase();
  document.getElementById('weightWrap').hidden = c.heat.scoreType !== 'load';
}
document.getElementById('plus').onclick = () => {
  const c = current();
  if(c.heat.scoreType === 'load'){ document.getElementById('weightWrap').hidden = false; return; }
  state.reps = (state.reps || 0) + 1;
  state.value = (state.value || 0) + 1;
  const target = parseFloat(c.move.reps || 0);
  if(target && state.reps >= target){ state.movementIndex = Math.min((state.movementIndex || 0) + 1, c.heat.movements.length - 1); state.reps = 0; }
  if(c.heat.tieBreakRep && !state.tieBreakValidated && state.value >= c.heat.tieBreakRep){ document.getElementById('tbModal').classList.add('open'); }
  persistScore(); save();
};
document.getElementById('minus').onclick = () => { state.reps = Math.max(0,(state.reps||0)-1); state.value = Math.max(0,(state.value||0)-1); persistScore(); save(); };
document.getElementById('validateWeight').onclick = () => { state.value = parseFloat(document.getElementById('weight').value || '0'); state.status = 'done'; persistScore(); save(); };
document.getElementById('dnf').onclick = () => { state.status = 'dnf'; persistScore(); save(); };
document.getElementById('abs').onclick = () => { state.status = 'absent'; persistScore(); save(); };
document.getElementById('tbConfirm').onclick = () => { state.tieBreakValidated = true; document.getElementById('tbModal').classList.remove('open'); persistScore(); save(); };
initSelectors(); render();
</script>
</body>
</html>
