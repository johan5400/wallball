<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA Timekeeper</title>
<style>
:root{--bg:#050816;--bg2:#0b1023;--card:rgba(12,18,38,.82);--line:rgba(255,255,255,.08);--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6;--violet:#8b5cf6;--green:#10b981;--amber:#f59e0b}
*{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--text);font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 15% 10%, rgba(59,130,246,.18), transparent 20%), radial-gradient(circle at 85% 0%, rgba(139,92,246,.16), transparent 20%), linear-gradient(180deg,var(--bg),var(--bg2))}
.shell{width:min(1500px,calc(100% - 28px));margin:0 auto;padding:22px 0 34px}
.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;font-weight:900;color:#bfd4ff}
h1,h2,h3{margin:0}
.clock{font-size:74px;font-weight:900;line-height:.92}
.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:16px}
.card{background:linear-gradient(180deg, rgba(14,22,44,.72), rgba(9,13,28,.92));border:1px solid var(--line);box-shadow:0 28px 80px rgba(0,0,0,.34);border-radius:28px;padding:22px}
.pill{padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-weight:900;font-size:12px;color:var(--muted)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:grid;place-items:center;min-height:74px;border:none;border-radius:20px;color:#fff;font-size:18px;font-weight:900}
.b1{background:linear-gradient(135deg,#166534,#10b981)} .b2{background:linear-gradient(135deg,#1d4ed8,#3b82f6)} .b3{background:linear-gradient(135deg,#6d28d9,#8b5cf6)} .b4{background:linear-gradient(135deg,#b45309,#f59e0b)}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
.zone h3{font-size:24px}
.sub{color:var(--muted);margin-top:6px}
.wod{white-space:pre-line;line-height:1.7;color:#dbe4f5;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:16px;border-radius:20px;margin:14px 0}
table{width:100%;border-collapse:collapse}
th,td{padding:14px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)} th{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.progress{width:160px;height:12px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid rgba(255,255,255,.05)} .fill{height:100%;border-radius:999px}
@media(max-width:1100px){.hero,.zones{grid-template-columns:1fr}.clock{font-size:52px}}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div>
      <div class="eyebrow">DELTA · TIMEKEEPER</div>
      <h1>Centre nerveux compétition</h1>
    </div>
    <div class="clock" id="clock">00:00:00</div>
  </header>

  <section class="hero">
    <article class="card">
      <div class="eyebrow">Pilotage global</div>
      <h2 style="font-size:34px;margin-top:8px">GO FIGHT 2026</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
        <div class="pill" id="liveCount">0 heats live</div>
        <div class="pill" id="preCount">0 pré-lancés</div>
        <div class="pill" id="doneCount">0 terminés</div>
      </div>
    </article>
    <article class="card">
      <div class="eyebrow" style="margin-bottom:12px">Actions</div>
      <div class="actions">
        <div class="btn b1">GO FIGHT</div>
        <div class="btn b2">LIVE</div>
        <div class="btn b3">HEAT SUIVANT</div>
        <div class="btn b4">ALERTE</div>
      </div>
    </article>
  </section>

  <section class="zones" id="zones"></section>
</div>

<script>
const payload = JSON.parse(localStorage.getItem('delta_admin_payload') || '{"config":{"zonesCount":2},"heats":[{"id":"h1","zone":1,"heatNo":1,"wodName":"WOD 1","scoreType":"reps","movements":[{"reps":"21","move":"Wall Balls"},{"reps":"15","move":"Toes to Bar"},{"reps":"9","move":"Snatch 60kg"}],"lanes":[{"lane":1,"teamName":"TEAM ALPHA"},{"lane":2,"teamName":"TEAM BRAVO"},{"lane":3,"teamName":"TEAM SIGMA"}]},{"id":"h2","zone":2,"heatNo":1,"wodName":"WOD 1","scoreType":"reps","movements":[{"reps":"21","move":"Wall Balls"},{"reps":"15","move":"Toes to Bar"},{"reps":"9","move":"Snatch 60kg"}],"lanes":[{"lane":1,"teamName":"TEAM DELTA"},{"lane":2,"teamName":"TEAM NOVA"},{"lane":3,"teamName":"TEAM OMEGA"}]}],"scores":{}}');
const live = JSON.parse(localStorage.getItem('delta_live_payload') || '{}');
function prog(v){ return Math.max(0, Math.min(100, (Number(v||0)/135)*100)); }
function col(p){ if(p<30) return '#ef4444'; if(p<70) return '#f59e0b'; return '#10b981'; }
function render(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR');
  document.getElementById('liveCount').textContent = (payload.heats||[]).length + ' heats';
  document.getElementById('preCount').textContent = (payload.config?.zonesCount || 2) + ' zones';
  document.getElementById('doneCount').textContent = Object.values(payload.scores||{}).filter(s => s.status === 'done').length + ' terminés';
  const zones = Array.from({length: payload.config?.zonesCount || 2}, (_,i)=>i+1).map(zone => {
    const heat = (payload.heats||[]).find(h => Number(h.zone) === zone);
    if(!heat) return `<article class="card zone"><h3>Zone ${zone}</h3><div class="sub">Aucun heat</div></article>`;
    const rows = (heat.lanes||[]).map(l => {
      const key = heat.id + '_' + l.lane;
      const score = payload.scores?.[key] || {};
      return { lane:l.lane, team:l.teamName, score:Number(score.value||0), status:score.status||'live' };
    }).sort((a,b) => b.score - a.score);
    return `<article class="card zone">
      <h3>Zone ${zone} · ${heat.wodName}</h3>
      <div class="sub">Heat ${heat.heatNo}</div>
      <div class="wod">${(heat.movements||[]).map(m => `${m.reps} ${m.move}`).join('\n')}</div>
      <table>
        <thead><tr><th>Lane</th><th>Team</th><th>Score</th><th>Statut</th><th>Progression</th></tr></thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td>${r.lane}</td>
            <td>${r.team}</td>
            <td>${r.score}</td>
            <td>${r.status}</td>
            <td><div class="progress"><div class="fill" style="width:${prog(r.score)}%;background:${col(prog(r.score))}"></div></div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </article>`;
  }).join('');
  document.getElementById('zones').innerHTML = zones;
}
render(); setInterval(render, 1000);
</script>
</body>
</html>
